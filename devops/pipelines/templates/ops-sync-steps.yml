# Shared template for Operations API sync steps
# Copies common.py + the target script from sync/ into a flat working
# directory so that "from common import ..." works without path hacks.
# This eliminates the need for duplicate script copies in devops/.
#
# SCHEDULE STAGGER (intentional — do not "optimise"):
# Sync pipelines run in a deliberate stagger to avoid concurrent DB load:
#   04:00  ops-sync-confluence        (Confluence issues)
#   04:30  Databricks GAppSupp - Get Master Server Data job (runs saved query)
#   05:00  ops-sync-servers           (reads from Jobs API, --source jobs)
#   05:00  Databricks GAppSupp - Get EOL Dates job (runs saved query)
#   05:05  Databricks GAppSupp - Get EOL Server Software job (runs saved query)
#   05:30  ops-sync-eol-dates         (reads from Jobs API, --source jobs)
#   05:35  ops-sync-eol-software      (reads from Jobs API, --source jobs)
#   06:00  ops-sync-certificates      (PowerShell cert scan + sync)
#   06:30  ops-sync-patching-schedule (patching HTML page)
#   07:00  ops-alert-unmatched        (unmatched server spike check)
#   07:30  ops-maintenance-daily      (refresh cert expiry calculations)
#   08:00  ops-health-alert           (overall sync health — runs after all syncs)
#   03:00  ops-maintenance-monthly    (purge sync_history >90 days — 1st of month only)

parameters:
  - name: scriptPath
    type: string
    # Relative to sync/, e.g. "servers/sync_server_list.py"
  - name: displayName
    type: string
  - name: extraArgs
    type: string
    default: '--verbose'
  - name: databricksJobId
    type: string
    default: ''
  # Opt-in flag — only ops-sync-disks.yml sets this. Keeps SolarWinds
  # credentials out of the env block of every other sync's process.
  - name: solarwindsEnv
    type: boolean
    default: false

steps:
  # Cache pip downloads keyed on requirements.txt hash. Cache hit skips the
  # network round-trip entirely; cache miss populates the cache for next run.
  # Path lives under $(Pipeline.Workspace) so it's per-pipeline and isolated
  # between concurrent agent jobs.
  - task: Cache@2
    inputs:
      key: 'pip | "$(Agent.OS)" | $(Build.SourcesDirectory)/operations-api/sync/requirements.txt'
      path: '$(Pipeline.Workspace)\.pip-cache'
    displayName: 'Cache pip downloads'

  - powershell: |
      $repoRoot = "$(Build.SourcesDirectory)\operations-api"
      $workDir = "$(Build.StagingDirectory)\sync_run"
      New-Item -ItemType Directory -Force -Path $workDir | Out-Null
      Copy-Item "$repoRoot\sync\common.py" "$workDir\"
      Copy-Item "$repoRoot\sync\${{ parameters.scriptPath }}" "$workDir\"
      # --cache-dir points pip at the cached wheels above. When sync/requirements.txt
      # is regenerated with `pip-compile --generate-hashes`, add `--require-hashes`
      # to this command line to make supply-chain pinning enforceable.
      pip install --cache-dir "$(Pipeline.Workspace)\.pip-cache" -r "$repoRoot\sync\requirements.txt"
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: 'Prepare sync environment'
    timeoutInMinutes: 10
    errorActionPreference: stop

  - powershell: |
      $workDir = "$(Build.StagingDirectory)\sync_run"
      Set-Location $workDir
      $scriptName = Split-Path "${{ parameters.scriptPath }}" -Leaf
      python $scriptName ${{ parameters.extraArgs }}
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: ${{ parameters.displayName }}
    timeoutInMinutes: 30
    errorActionPreference: stop
    env:
      OPS_DB_HOST: $(OPS_DB_HOST)
      OPS_DB_PORT: $(OPS_DB_PORT)
      OPS_DB_NAME: $(OPS_DB_NAME)
      OPS_DB_USER: $(OPS_DB_USER)
      OPS_DB_PASSWORD: $(OPS_DB_PASSWORD)
      OPS_DB_SSLMODE: $(OPS_DB_SSLMODE)
      DATABRICKS_HOST: $(DATABRICKS_HOST)
      DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)
      DATABRICKS_WAREHOUSE_ID: $(DATABRICKS_WAREHOUSE_ID)
      DATABRICKS_AUTH_MODE: $(DATABRICKS_AUTH_MODE)
      DATABRICKS_SP_TENANT_ID: $(DATABRICKS_SP_TENANT_ID)
      DATABRICKS_SP_CLIENT_ID: $(DATABRICKS_SP_CLIENT_ID)
      DATABRICKS_SP_CLIENT_SECRET: $(DATABRICKS_SP_CLIENT_SECRET)
      DATABRICKS_JOB_ID: ${{ parameters.databricksJobId }}
      # SolarWinds — opt-in via parameters.solarwindsEnv. Only ops-sync-disks.yml
      # passes solarwindsEnv: true; other syncs do not see these connection
      # coordinates in env. Auth is via Trusted_Connection on the dedicated
      # solarwinds-readers agent — no USER/PASSWORD vars are needed.
      ${{ if eq(parameters.solarwindsEnv, true) }}:
        SOLARWINDS_HOST:     $(SOLARWINDS_HOST)
        SOLARWINDS_DATABASE: $(SOLARWINDS_DATABASE)

  # Alert Teams immediately on sync step failure — don't wait for the 08:00 health check.
  # Requires TEAMS_WEBHOOK_URL in the variable group; silently skips if not set.
  - powershell: |
      $repoRoot = "$(Build.SourcesDirectory)\operations-api"
      if ($env:TEAMS_WEBHOOK_URL) {
        python "$repoRoot\sync\alerts\alert_sync_failure.py"
      } else {
        Write-Host "TEAMS_WEBHOOK_URL not set - skipping alert"
      }
    displayName: 'Alert Teams on sync failure'
    condition: failed()
    continueOnError: true
    timeoutInMinutes: 2
    env:
      TEAMS_WEBHOOK_URL: $(TEAMS_WEBHOOK_URL)
      ALERT_DISPLAY_NAME: "Sync Failed: ${{ parameters.displayName }}"
      ALERT_PIPELINE_INFO: "Pipeline: $(Build.DefinitionName) | Run #$(Build.BuildId)"
