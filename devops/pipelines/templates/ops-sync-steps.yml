# Shared template for Operations API sync steps
# Copies common.py + the target script from sync/ into a flat working
# directory so that "from common import ..." works without path hacks.
# This eliminates the need for duplicate script copies in devops/.
#
# SCHEDULE STAGGER (intentional — do not "optimise"):
# Sync pipelines run in a deliberate stagger to avoid concurrent DB load:
#   04:00  ops-sync-confluence        (Confluence issues)
#   04:30  Databricks GAppSupp - Get Master Server Data job (runs saved query)
#   05:00  ops-sync-servers           (reads from Jobs API, --source jobs)
#   05:00  Databricks GAppSupp - Get EOL Dates job (runs saved query)
#   05:05  Databricks GAppSupp - Get EOL Server Software job (runs saved query)
#   05:30  ops-sync-eol-dates         (reads from Jobs API, --source jobs)
#   05:35  ops-sync-eol-software      (reads from Jobs API, --source jobs)
#   06:00  ops-sync-certificates      (PowerShell cert scan + sync)
#   06:30  ops-sync-patching-schedule (patching HTML page)
#   07:00  ops-alert-unmatched        (unmatched server spike check)
#   08:00  ops-health-alert           (overall sync health — runs after all syncs)

parameters:
  - name: scriptPath
    type: string
    # Relative to sync/, e.g. "servers/sync_server_list.py"
  - name: displayName
    type: string
  - name: extraArgs
    type: string
    default: '--verbose'

steps:
  - script: |
      REPO_ROOT="$(Build.SourcesDirectory)/operations-api"
      WORK_DIR="$(Build.StagingDirectory)/sync_run"
      mkdir -p "$WORK_DIR"
      cp "$REPO_ROOT/sync/common.py" "$WORK_DIR/"
      cp "$REPO_ROOT/sync/${{ parameters.scriptPath }}" "$WORK_DIR/"
      pip install -r "$REPO_ROOT/sync/requirements.txt"
    displayName: 'Prepare sync environment'
    timeoutInMinutes: 10

  - script: |
      cd "$(Build.StagingDirectory)/sync_run"
      SCRIPT_NAME="${{ parameters.scriptPath }}"
      python "${SCRIPT_NAME##*/}" $EXTRA_ARGS
    displayName: ${{ parameters.displayName }}
    timeoutInMinutes: 30
    env:
      EXTRA_ARGS: ${{ parameters.extraArgs }}
      OPS_DB_HOST: $(OPS_DB_HOST)
      OPS_DB_PORT: $(OPS_DB_PORT)
      OPS_DB_NAME: $(OPS_DB_NAME)
      OPS_DB_USER: $(OPS_DB_USER)
      OPS_DB_PASSWORD: $(OPS_DB_PASSWORD)
      DATABRICKS_HOST: $(DATABRICKS_HOST)
      DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)
      DATABRICKS_WAREHOUSE_ID: $(DATABRICKS_WAREHOUSE_ID)
      DATABRICKS_AUTH_MODE: $(DATABRICKS_AUTH_MODE)
      DATABRICKS_SP_TENANT_ID: $(DATABRICKS_SP_TENANT_ID)
      DATABRICKS_SP_CLIENT_ID: $(DATABRICKS_SP_CLIENT_ID)
      DATABRICKS_SP_CLIENT_SECRET: $(DATABRICKS_SP_CLIENT_SECRET)
      DATABRICKS_JOB_ID: $(DATABRICKS_JOB_ID)

  # Alert Teams immediately on sync step failure — don't wait for the 08:00 health check.
  # Requires TEAMS_WEBHOOK_URL in the variable group; silently skips if not set.
  - script: |
      REPO_ROOT="$(Build.SourcesDirectory)/operations-api"
      python "$REPO_ROOT/sync/alerts/alert_sync_failure.py"
    displayName: 'Alert Teams on sync failure'
    condition: failed()
    continueOnError: true
    env:
      TEAMS_WEBHOOK_URL: $(TEAMS_WEBHOOK_URL)
      ALERT_DISPLAY_NAME: "Sync Failed: ${{ parameters.displayName }}"
      ALERT_PIPELINE_INFO: "Pipeline: $(Build.DefinitionName) | Run #$(Build.BuildId)"
