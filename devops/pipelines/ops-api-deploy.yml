# Operations API - Deploy Pipeline (CD)
# Deploys a build artifact to IIS with DB migrations, backup, and health check
# Manual trigger only — uses environment approval gates

trigger: none

parameters:
  - name: buildPipelineRunId
    displayName: 'Build pipeline run ID (leave empty for latest)'
    type: string
    default: ''

pool:
  name: 'Default'

variables:
  - group: operations-api-prod
  - name: iisSiteName
    value: 'OperationsApi'
  - name: iisAppPoolName
    value: 'OperationsApi'
  - name: deployPath
    value: 'C:\inetpub\operations-api'
  - name: dbBackupPath
    value: 'C:\backups\ops-api-db'

stages:
  - stage: Deploy
    displayName: 'Deploy to Production'
    jobs:
      - deployment: DeployApi
        displayName: 'Deploy Operations API'
        environment: 'operations-api-prod'
        strategy:
          runOnce:
            deploy:
              steps:
                # ── Download build artifact ──────────────────────────────
                - task: DownloadBuildArtifacts@1
                  inputs:
                    buildType: 'specific'
                    project: '$(System.TeamProjectId)'
                    pipeline: 'ops-api-build'
                    ${{ if eq(parameters.buildPipelineRunId, '') }}:
                      buildVersionToDownload: 'latest'
                    ${{ else }}:
                      buildVersionToDownload: 'specific'
                      runId: '${{ parameters.buildPipelineRunId }}'
                    downloadType: 'single'
                    artifactName: 'operations-api'
                    downloadPath: '$(Pipeline.Workspace)/artifact'
                  displayName: 'Download build artifact'

                # ── Database backup (pre-migration) ──────────────────────
                # A failed dump aborts the pipeline — no migration runs without a backup.
                - task: PowerShell@2
                  displayName: 'Database backup (pre-migration)'
                  inputs:
                    targetType: inline
                    script: |
                      $backupDir = "$(dbBackupPath)"
                      if (-not (Test-Path $backupDir)) {
                          New-Item -ItemType Directory -Path $backupDir | Out-Null
                          Write-Host "Created backup directory: $backupDir"
                      }

                      # Locate pg_dump
                      $pgDumpCmd = Get-Command pg_dump -ErrorAction SilentlyContinue
                      if ($pgDumpCmd) {
                          $pgDump = $pgDumpCmd.Source
                      } else {
                          $pgDump = (Get-ChildItem "C:\Program Files\PostgreSQL\*\bin\pg_dump.exe" -ErrorAction SilentlyContinue |
                                     Sort-Object FullName | Select-Object -Last 1).FullName
                          if (-not $pgDump) {
                              Write-Error "pg_dump.exe not found. Is PostgreSQL installed?"
                              exit 1
                          }
                      }
                      Write-Host "Using pg_dump: $pgDump"

                      $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
                      $dumpFile = "$backupDir\ops-api-db-$timestamp.dump"

                      $pgpassFile = [System.IO.Path]::GetTempFileName()
                      try {
                          $pgpassEntry = "$(OPS_DB_HOST):$(OPS_DB_PORT):$(OPS_DB_NAME):$(OPS_DB_MIGRATE_USER):" + $env:OPS_DB_PASSWORD
                          [System.IO.File]::WriteAllText($pgpassFile, $pgpassEntry, [System.Text.Encoding]::ASCII)
                          $env:PGPASSFILE = $pgpassFile

                          & $pgDump -h "$(OPS_DB_HOST)" -p "$(OPS_DB_PORT)" -d "$(OPS_DB_NAME)" `
                                    -U "$(OPS_DB_MIGRATE_USER)" -F c -f $dumpFile
                          if ($LASTEXITCODE -ne 0) {
                              Write-Error "pg_dump failed (exit $LASTEXITCODE) — deployment aborted"
                              exit 1
                          }
                      } finally {
                          Remove-Item -Path $pgpassFile -Force -ErrorAction SilentlyContinue
                          [System.Environment]::SetEnvironmentVariable('PGPASSFILE', $null)
                      }

                      Write-Host "DB dump written to: $dumpFile"
                      Write-Host "##vso[task.setvariable variable=dbDumpFile]$dumpFile"

                      # Keep last 5 dumps, remove older ones
                      $dumps = Get-ChildItem "$backupDir\ops-api-db-*.dump" |
                          Sort-Object Name -Descending |
                          Select-Object -Skip 5
                      foreach ($old in $dumps) {
                          Write-Host "Removing old dump: $($old.Name)"
                          Remove-Item $old.FullName -Force
                      }
                  env:
                    OPS_DB_PASSWORD: $(OPS_DB_PASSWORD)

                # ── Database migrations ──────────────────────────────────
                - task: PowerShell@2
                  displayName: 'Run database migrations'
                  inputs:
                    targetType: inline
                    script: |
                      $sqlDir = Get-ChildItem "$(Pipeline.Workspace)/artifact" -Recurse -Directory -Filter "database" | Select-Object -First 1
                      if (-not $sqlDir) {
                          Write-Error "No database directory found in artifact"
                          exit 1
                      }

                      # Locate psql
                      $psqlCmd = Get-Command psql -ErrorAction SilentlyContinue
                      if ($psqlCmd) {
                          $psql = $psqlCmd.Source
                      } else {
                          $psql = (Get-ChildItem "C:\Program Files\PostgreSQL\*\bin\psql.exe" -ErrorAction SilentlyContinue |
                                   Sort-Object FullName | Select-Object -Last 1).FullName
                          if (-not $psql) {
                              Write-Error "psql.exe not found. Is PostgreSQL installed?"
                              exit 1
                          }
                      }
                      Write-Host "Using psql: $psql"

                      # Write password to a temp pgpass file so it never appears in
                      # PGPASSWORD (which can leak into process listings and error logs).
                      # Format: hostname:port:database:username:password
                      $pgpassFile = [System.IO.Path]::GetTempFileName()
                      try {
                          $pgpassEntry = "$(OPS_DB_HOST):$(OPS_DB_PORT):$(OPS_DB_NAME):$(OPS_DB_MIGRATE_USER):" + $env:OPS_DB_PASSWORD
                          [System.IO.File]::WriteAllText($pgpassFile, $pgpassEntry, [System.Text.Encoding]::ASCII)
                          $env:PGPASSFILE = $pgpassFile

                          # Run scripts 001+ in order (skip 000-extensions.sql — requires superuser)
                          $scripts = Get-ChildItem "$($sqlDir.FullName)\*.sql" |
                              Where-Object { $_.Name -notmatch '^000' } |
                              Sort-Object Name

                          Write-Host "Found $($scripts.Count) migration scripts"

                          # Check if the migration tracking table exists (absent on first deploy).
                          # On first deploy every script runs; on subsequent deploys only pending ones do.
                          $trackingCheck = & $psql -h "$(OPS_DB_HOST)" -p "$(OPS_DB_PORT)" -d "$(OPS_DB_NAME)" `
                              -U "$(OPS_DB_MIGRATE_USER)" -t -c `
                              "SELECT 1 FROM information_schema.tables WHERE table_schema='system' AND table_name='schema_migrations'"
                          $trackingTableExists = ($trackingCheck | Select-String '1') -ne $null

                          $appliedScripts = @()
                          if ($trackingTableExists) {
                              $appliedScripts = (& $psql -h "$(OPS_DB_HOST)" -p "$(OPS_DB_PORT)" -d "$(OPS_DB_NAME)" `
                                  -U "$(OPS_DB_MIGRATE_USER)" -t -c `
                                  "SELECT script_name FROM system.schema_migrations WHERE rolled_back_at IS NULL") |
                                  ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
                              Write-Host "Tracking table found — $($appliedScripts.Count) script(s) already applied"
                          } else {
                              Write-Host "Tracking table not found — first deploy, all scripts will run"
                          }

                          $ran = 0
                          $skipped = 0
                          foreach ($script in $scripts) {
                              if ($appliedScripts -contains $script.Name) {
                                  Write-Host "Skipping (already applied): $($script.Name)"
                                  $skipped++
                                  continue
                              }
                              Write-Host "Running: $($script.Name)"
                              & $psql -h "$(OPS_DB_HOST)" -p "$(OPS_DB_PORT)" -d "$(OPS_DB_NAME)" `
                                      -U "$(OPS_DB_MIGRATE_USER)" -f $script.FullName -v ON_ERROR_STOP=1
                              if ($LASTEXITCODE -ne 0) {
                                  Write-Error "Migration failed on $($script.Name) — deployment aborted"
                                  exit 1
                              }
                              # Record the script in the tracking table if it now exists
                              # (007 creates the table, so subsequent scripts in the same run are recorded).
                              $postCheck = & $psql -h "$(OPS_DB_HOST)" -p "$(OPS_DB_PORT)" -d "$(OPS_DB_NAME)" `
                                  -U "$(OPS_DB_MIGRATE_USER)" -t -c `
                                  "SELECT 1 FROM information_schema.tables WHERE table_schema='system' AND table_name='schema_migrations'"
                              if (($postCheck | Select-String '1') -ne $null) {
                                  & $psql -h "$(OPS_DB_HOST)" -p "$(OPS_DB_PORT)" -d "$(OPS_DB_NAME)" `
                                      -U "$(OPS_DB_MIGRATE_USER)" -c `
                                      "INSERT INTO system.schema_migrations (script_name) VALUES ('$($script.Name)') ON CONFLICT (script_name) DO NOTHING" | Out-Null
                              }
                              Write-Host "  OK"
                              $ran++
                          }
                          Write-Host "Migrations complete — ran: $ran, skipped: $skipped"
                      } finally {
                          # Always clean up the pgpass file regardless of success or failure
                          Remove-Item -Path $pgpassFile -Force -ErrorAction SilentlyContinue
                          [System.Environment]::SetEnvironmentVariable('PGPASSFILE', $null)
                      }
                  env:
                    OPS_DB_PASSWORD: $(OPS_DB_PASSWORD)

                # ── Stop IIS app pool ────────────────────────────────────
                - task: PowerShell@2
                  displayName: 'Stop IIS app pool'
                  inputs:
                    targetType: inline
                    script: |
                      Import-Module WebAdministration
                      $pool = "$(iisAppPoolName)"

                      if ((Get-WebAppPoolState -Name $pool).Value -eq 'Started') {
                          Stop-WebAppPool -Name $pool
                          Write-Host "Stopping app pool: $pool"

                          $timeout = 30
                          $elapsed = 0
                          while ((Get-WebAppPoolState -Name $pool).Value -ne 'Stopped' -and $elapsed -lt $timeout) {
                              Start-Sleep -Seconds 2
                              $elapsed += 2
                          }

                          if ((Get-WebAppPoolState -Name $pool).Value -ne 'Stopped') {
                              Write-Warning "App pool did not stop within ${timeout}s — proceeding anyway"
                          } else {
                              Write-Host "App pool stopped"
                          }
                      } else {
                          Write-Host "App pool already stopped"
                      }

                # ── Backup current deployment ────────────────────────────
                - task: PowerShell@2
                  displayName: 'Backup current deployment'
                  inputs:
                    targetType: inline
                    script: |
                      $deployPath = "$(deployPath)"

                      if (Test-Path $deployPath) {
                          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
                          $backupPath = "${deployPath}.backup.${timestamp}"
                          Write-Host "Backing up to: $backupPath"
                          Copy-Item -Path $deployPath -Destination $backupPath -Recurse
                          Write-Host "Backup complete"

                          # Keep last 3 backups, remove older ones
                          $backups = Get-ChildItem "${deployPath}.backup.*" -Directory |
                              Sort-Object Name -Descending |
                              Select-Object -Skip 3
                          foreach ($old in $backups) {
                              Write-Host "Removing old backup: $($old.Name)"
                              Remove-Item $old.FullName -Recurse -Force
                          }
                      } else {
                          Write-Host "No existing deployment to back up (first deploy)"
                          New-Item -ItemType Directory -Path $deployPath | Out-Null
                      }

                # ── Deploy API files ─────────────────────────────────────
                - task: PowerShell@2
                  displayName: 'Deploy API to IIS'
                  inputs:
                    targetType: inline
                    script: |
                      $deployPath = "$(deployPath)"
                      $artifactApi = Get-ChildItem "$(Pipeline.Workspace)/artifact" -Recurse -Directory -Filter "api" | Select-Object -First 1

                      if (-not $artifactApi) {
                          Write-Error "No api directory found in artifact"
                          exit 1
                      }

                      Write-Host "Deploying from: $($artifactApi.FullName)"
                      Write-Host "Deploying to:   $deployPath"
                      Copy-Item -Path "$($artifactApi.FullName)\*" -Destination $deployPath -Recurse -Force
                      Write-Host "API files deployed"

                # ── Write production config ──────────────────────────────
                - task: PowerShell@2
                  displayName: 'Write appsettings.Production.json'
                  inputs:
                    targetType: inline
                    script: |
                      $origins = "$(OPS_CORS_ORIGINS)".Split(",", [System.StringSplitOptions]::RemoveEmptyEntries) |
                          ForEach-Object { $_.Trim() }

                      $settings = @{
                          ConnectionStrings = @{
                              OperationsDb = $env:OPS_CONNECTIONSTRING
                          }
                          Authentication = @{
                              Mode = "Windows"
                          }
                          Cors = @{
                              AllowedOrigins = $origins
                          }
                      } | ConvertTo-Json -Depth 3

                      $settingsPath = "$(deployPath)\appsettings.Production.json"
                      $settings | Out-File -FilePath $settingsPath -Encoding utf8
                      Write-Host "Wrote $settingsPath"

                      # Restrict ACL: disable inheritance, remove broad groups,
                      # grant only SYSTEM, the AppPool identity, and Administrators.
                      icacls $settingsPath /inheritance:d | Out-Null
                      icacls $settingsPath /remove:g "Users" | Out-Null
                      icacls $settingsPath /remove:g "Authenticated Users" | Out-Null
                      icacls $settingsPath /grant:r "SYSTEM:(F)" | Out-Null
                      icacls $settingsPath /grant:r "IIS AppPool\OperationsApi:(R)" | Out-Null
                      icacls $settingsPath /grant:r "BUILTIN\Administrators:(F)" | Out-Null
                      Write-Host "appsettings.Production.json ACL restricted to SYSTEM, AppPool, Administrators"
                  env:
                    OPS_CONNECTIONSTRING: $(OPS_CONNECTIONSTRING)

                # ── Deploy frontend ──────────────────────────────────────
                - task: PowerShell@2
                  displayName: 'Deploy frontend'
                  inputs:
                    targetType: inline
                    script: |
                      $wwwroot = "$(deployPath)\wwwroot"
                      if (-not (Test-Path $wwwroot)) {
                          New-Item -ItemType Directory -Path $wwwroot | Out-Null
                      }

                      $frontendDir = Get-ChildItem "$(Pipeline.Workspace)/artifact" -Recurse -Directory -Filter "frontend" | Select-Object -First 1
                      if ($frontendDir) {
                          Copy-Item "$($frontendDir.FullName)\*" $wwwroot -Force
                          Write-Host "Frontend deployed to $wwwroot ($(Get-ChildItem $wwwroot | Measure-Object).Count files)"
                      } else {
                          Write-Host "##[warning]No frontend found in artifact - skipping"
                      }

                # ── Start IIS app pool ───────────────────────────────────
                - task: PowerShell@2
                  displayName: 'Start IIS app pool'
                  inputs:
                    targetType: inline
                    script: |
                      Import-Module WebAdministration
                      $pool = "$(iisAppPoolName)"
                      Start-WebAppPool -Name $pool
                      Write-Host "Started app pool: $pool"
                      # Give the app a moment to initialize
                      Start-Sleep -Seconds 5

                # ── Health check gate ────────────────────────────────────
                - task: PowerShell@2
                  displayName: 'Health check'
                  inputs:
                    targetType: inline
                    script: |
                      $url = "http://localhost/healthz"
                      $maxRetries = 3
                      $retryDelay = 10

                      for ($i = 1; $i -le $maxRetries; $i++) {
                          Write-Host "Health check attempt $i of ${maxRetries}..."
                          try {
                              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 15
                              if ($response.StatusCode -eq 200) {
                                  $body = $response.Content
                                  Write-Host "Response: $body"
                                  if ($body -match "Healthy") {
                                      Write-Host "##[section]Deployment verified - API is healthy"
                                      exit 0
                                  } else {
                                      Write-Warning "Status 200 but response was: $body"
                                  }
                              }
                          } catch {
                              Write-Warning "Attempt $i failed: $($_.Exception.Message)"
                          }

                          if ($i -lt $maxRetries) {
                              Write-Host "Waiting $retryDelay seconds..."
                              Start-Sleep -Seconds $retryDelay
                          }
                      }

                      Write-Error "Health check failed after $maxRetries attempts. Check app pool and connection string."
                      exit 1
