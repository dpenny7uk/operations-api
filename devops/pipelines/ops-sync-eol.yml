# Operations API - End-of-Life Software Sync from Databricks
# Runs daily at 05:35 UTC (after EOL dates sync at 05:30)

trigger: none

schedules:
  - cron: "35 5 * * *"
    displayName: "Daily EOL software sync at 05:35"
    branches:
      include:
        - main
    always: true

pool:
  name: 'Default'

variables:
  - group: operations-sync-secrets

steps:
  - template: templates/ops-sync-steps.yml
    parameters:
      scriptPath: eol/sync_eol_software.py
      displayName: 'Sync EOL Software from Databricks'
