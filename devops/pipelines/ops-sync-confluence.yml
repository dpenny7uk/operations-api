# Operations API - Confluence Known Issues Sync
# Syncs patching issue pages from Confluence to PostgreSQL
# Runs daily at 04:00 UTC (before patching syncs that reference known issues)

trigger: none

schedules:
  - cron: "0 4 * * *"
    displayName: "Daily Confluence sync at 04:00"
    branches:
      include:
        - main
    always: true

pool:
  name: 'Default'

variables:
  - group: operations-api-prod

steps:
  - powershell: |
      $repoRoot = "$(Build.SourcesDirectory)\operations-api"
      $workDir = "$(Build.StagingDirectory)\sync_run"
      New-Item -ItemType Directory -Force -Path $workDir | Out-Null
      Copy-Item "$repoRoot\sync\common.py" "$workDir\"
      Copy-Item "$repoRoot\sync\confluence\sync_confluence_issues.py" "$workDir\"
      pip install -r "$repoRoot\sync\requirements.txt"
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: 'Prepare sync environment'
    timeoutInMinutes: 10
    errorActionPreference: stop

  - powershell: |
      Set-Location "$(Build.StagingDirectory)\sync_run"
      python sync_confluence_issues.py --verbose
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: 'Sync Confluence Known Issues'
    timeoutInMinutes: 30
    errorActionPreference: stop
    env:
      OPS_DB_HOST: $(OPS_DB_HOST)
      OPS_DB_PORT: $(OPS_DB_PORT)
      OPS_DB_NAME: $(OPS_DB_NAME)
      OPS_DB_USER: $(OPS_DB_USER)
      OPS_DB_PASSWORD: $(OPS_DB_PASSWORD)
      OPS_DB_SSLMODE: $(OPS_DB_SSLMODE)
      CONFLUENCE_URL: $(CONFLUENCE_URL)
      CONFLUENCE_EMAIL: $(CONFLUENCE_EMAIL)
      CONFLUENCE_TOKEN: $(CONFLUENCE_TOKEN)
      CONFLUENCE_PARENT_PAGE_ID: $(CONFLUENCE_PARENT_PAGE_ID)
