# Operations API - Build Pipeline (CI)
# Compiles .NET API and bundles artifact with frontend + DB scripts
# Triggers on push/PR when API, frontend, or database files change

trigger:
  branches:
    include:
      - main
      - feature/*
  paths:
    include:
      - 'operations-api/**'

pr:
  branches:
    include:
      - main
  paths:
    include:
      - 'operations-api/**'

pool:
  name: 'Default'

variables:
  buildConfiguration: 'Release'

steps:
  - powershell: dotnet restore OperationsApi.slnx
    workingDirectory: '$(Build.SourcesDirectory)/operations-api'
    displayName: 'Restore NuGet packages'

  - powershell: dotnet build OperationsApi.slnx --configuration $(buildConfiguration) --no-restore
    workingDirectory: '$(Build.SourcesDirectory)/operations-api'
    displayName: 'Build'

  - powershell: dotnet test OperationsApi.slnx --configuration $(buildConfiguration) --no-build --verbosity normal
    workingDirectory: '$(Build.SourcesDirectory)/operations-api'
    displayName: 'Run .NET tests'

  - powershell: dotnet publish OperationsApi.csproj --configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/api
    workingDirectory: '$(Build.SourcesDirectory)/operations-api'
    displayName: 'Publish API'

  - task: CopyFiles@2
    inputs:
      sourceFolder: '$(Build.SourcesDirectory)/operations-api/frontend'
      contents: |
        index.html
        css/**
        js/**
      targetFolder: '$(Build.ArtifactStagingDirectory)/frontend'
    displayName: 'Copy frontend'

  - task: CopyFiles@2
    inputs:
      sourceFolder: '$(Build.SourcesDirectory)/operations-api/database'
      contents: '*.sql'
      targetFolder: '$(Build.ArtifactStagingDirectory)/database'
    displayName: 'Copy database scripts'

  - task: PublishBuildArtifacts@1
    condition: succeeded()
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)'
      artifactName: 'operations-api'
    displayName: 'Publish artifact'
