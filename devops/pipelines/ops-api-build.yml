# Operations API - Build Pipeline (CI)
# Compiles .NET API and bundles artifact with frontend + DB scripts
# Triggers on push/PR when API, frontend, or database files change

trigger:
  branches:
    include:
      - main
      - feature/*
  paths:
    include:
      - '*.cs'
      - '*.csproj'
      - Controllers/**
      - Services/**
      - Models/**
      - Infrastructure/**
      - Program.cs
      - frontend/**
      - database/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - '*.cs'
      - '*.csproj'
      - Controllers/**
      - Services/**
      - Models/**
      - Infrastructure/**
      - Program.cs
      - frontend/**
      - database/**

pool:
  name: 'Default'

variables:
  buildConfiguration: 'Release'

steps:
  - task: UseDotNet@2
    inputs:
      packageType: 'sdk'
      version: '10.0.x'
    displayName: 'Install .NET 10 SDK'

  - script: dotnet restore
    workingDirectory: '$(Build.SourcesDirectory)/operations-api'
    displayName: 'Restore NuGet packages'

  - script: dotnet build --configuration $(buildConfiguration) --no-restore
    workingDirectory: '$(Build.SourcesDirectory)/operations-api'
    displayName: 'Build'

  # Uncomment when a .NET test project is added:
  # - script: dotnet test --configuration $(buildConfiguration) --no-build --verbosity normal
  #   workingDirectory: '$(Build.SourcesDirectory)/operations-api'
  #   displayName: 'Run .NET tests'

  - script: dotnet publish --configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/api
    workingDirectory: '$(Build.SourcesDirectory)/operations-api'
    displayName: 'Publish API'

  - task: CopyFiles@2
    inputs:
      sourceFolder: '$(Build.SourcesDirectory)/operations-api/frontend'
      contents: 'index.html'
      targetFolder: '$(Build.ArtifactStagingDirectory)/frontend'
    displayName: 'Copy frontend'

  - task: CopyFiles@2
    inputs:
      sourceFolder: '$(Build.SourcesDirectory)/operations-api/database'
      contents: '*.sql'
      targetFolder: '$(Build.ArtifactStagingDirectory)/database'
    displayName: 'Copy database scripts'

  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)'
      artifactName: 'operations-api'
    displayName: 'Publish artifact'
