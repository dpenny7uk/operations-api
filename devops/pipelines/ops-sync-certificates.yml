# Operations API - Certificate Scan + Sync
# Step 1: Query active servers from shared.servers (excludes desktops)
# Step 2: PowerShell scans servers for certificates (outputs CSV)
# Step 3: Python syncs CSV data into PostgreSQL
# Runs daily at 06:00 UTC

trigger: none

schedules:
  - cron: "0 6 * * *"
    displayName: "Daily certificate scan at 06:00"
    branches:
      include:
        - main
    always: true

pool:
  name: 'Default'

variables:
  - group: operations-api-prod
  - name: certScanPorts
    value: '443,8443'

steps:
  # Step 1: Build server list from database (only real servers, no desktops)
  - powershell: |
      $serverList = "$(Build.StagingDirectory)\scan-servers.txt"
      $env:PGPASSWORD = $env:OPS_DB_PASSWORD
      $query = "SELECT server_name FROM shared.servers WHERE is_active = TRUE AND LEFT(LOWER(server_name), 2) IN ('pr','dv','sy','ut','st','tr','ls','ss','pc','ci') ORDER BY server_name"
      & psql -h $env:OPS_DB_HOST -p $env:OPS_DB_PORT -d $env:OPS_DB_NAME -U $env:OPS_DB_USER -t -A -c $query | Out-File -Encoding utf8 $serverList
      $entries = Get-Content $serverList | Where-Object { $_.Trim() -ne '' }
      if ($entries.Count -eq 0) {
          Write-Error "No active servers found in shared.servers — aborting scan"
          exit 1
      }
      Write-Host "Built server list with $($entries.Count) server(s) from database"
    displayName: 'Build server list from database'
    timeoutInMinutes: 5
    errorActionPreference: stop
    env:
      OPS_DB_HOST: $(OPS_DB_HOST)
      OPS_DB_PORT: $(OPS_DB_PORT)
      OPS_DB_NAME: $(OPS_DB_NAME)
      OPS_DB_USER: $(OPS_DB_USER)
      OPS_DB_PASSWORD: $(OPS_DB_PASSWORD)
      OPS_DB_SSLMODE: $(OPS_DB_SSLMODE)

  # Step 2: Run PowerShell certificate scan
  - powershell: |
      $repoRoot = "$(Build.SourcesDirectory)\operations-api"
      $portsArray = "$(certScanPorts)" -split ',' | ForEach-Object { [int]$_.Trim() }
      & "$repoRoot\sync\certificates\Get-SSLCertificateExpiry.ps1" `
        -ServerListPath "$(Build.StagingDirectory)\scan-servers.txt" `
        -EndpointsPath "$repoRoot\config\certificate-endpoints.csv" `
        -OutputPath "$(Build.StagingDirectory)" `
        -ThresholdDays 30 `
        -CriticalDays 7 `
        -Ports $portsArray `
        -ThrottleLimit 20
    displayName: 'Scan certificates on servers'
    timeoutInMinutes: 30
    errorActionPreference: stop

  # Step 2b: Verify at least one CSV was produced before running sync
  - powershell: |
      $csvFiles = Get-ChildItem -Path "$(Build.StagingDirectory)" -Filter "SSL-CertExpiry-*.csv" -ErrorAction SilentlyContinue
      if (-not $csvFiles) {
          Write-Error "Certificate scan produced no CSV output — aborting sync to prevent mass cert deactivation."
          exit 1
      }
      Write-Host "Found $($csvFiles.Count) CSV file(s): $($csvFiles.Name -join ', ')"
    displayName: 'Verify certificate scan output exists'

  # Step 3: Prepare sync environment
  - powershell: |
      $repoRoot = "$(Build.SourcesDirectory)\operations-api"
      $workDir = "$(Build.StagingDirectory)\sync_run"
      New-Item -ItemType Directory -Force -Path $workDir | Out-Null
      Copy-Item "$repoRoot\sync\common.py" "$workDir\"
      Copy-Item "$repoRoot\sync\certificates\sync_certificates.py" "$workDir\"
      pip install -r "$repoRoot\sync\requirements.txt"
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: 'Prepare sync environment'
    timeoutInMinutes: 10
    errorActionPreference: stop

  # Step 3b: Sync certificate data
  - powershell: |
      Set-Location "$(Build.StagingDirectory)\sync_run"
      python sync_certificates.py --csv "$(Build.StagingDirectory)\SSL-CertExpiry-*.csv" --verbose
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: 'Sync certificate data to PostgreSQL'
    timeoutInMinutes: 30
    errorActionPreference: stop
    env:
      OPS_DB_HOST: $(OPS_DB_HOST)
      OPS_DB_PORT: $(OPS_DB_PORT)
      OPS_DB_NAME: $(OPS_DB_NAME)
      OPS_DB_USER: $(OPS_DB_USER)
      OPS_DB_PASSWORD: $(OPS_DB_PASSWORD)
      OPS_DB_SSLMODE: $(OPS_DB_SSLMODE)

  # Step 4: Prepare cert expiry alert
  - powershell: |
      $repoRoot = "$(Build.SourcesDirectory)\operations-api"
      $workDir = "$(Build.StagingDirectory)\sync_run"
      Copy-Item "$repoRoot\sync\alerts\alert_cert_expiry.py" "$workDir\"
    displayName: 'Prepare cert expiry alert'
    errorActionPreference: stop

  # Step 4b: Alert Teams on expiring certificates
  - powershell: |
      Set-Location "$(Build.StagingDirectory)\sync_run"
      python alert_cert_expiry.py --verbose
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: 'Alert Teams on expiring certificates'
    condition: succeeded()
    errorActionPreference: stop
    env:
      OPS_DB_HOST: $(OPS_DB_HOST)
      OPS_DB_PORT: $(OPS_DB_PORT)
      OPS_DB_NAME: $(OPS_DB_NAME)
      OPS_DB_USER: $(OPS_DB_USER)
      OPS_DB_PASSWORD: $(OPS_DB_PASSWORD)
      OPS_DB_SSLMODE: $(OPS_DB_SSLMODE)
      TEAMS_WEBHOOK_URL: $(TEAMS_WEBHOOK_URL)
