# Operations API - Run unit tests on every push/PR
# Gates deployments: if tests fail, nothing deploys.

trigger:
  branches:
    include:
      - main
      - feature/*
  paths:
    include:
      - 'operations-api/sync/**'

pr:
  branches:
    include:
      - main
  paths:
    include:
      - 'operations-api/sync/**'

pool:
  name: 'Default'

steps:
  - powershell: |
      pip install -r "$(Build.SourcesDirectory)\operations-api\sync\requirements.txt"
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: 'Install dependencies'
    timeoutInMinutes: 10
    errorActionPreference: stop

  - powershell: |
      Set-Location "$(Build.SourcesDirectory)\operations-api\sync"
      python -m pytest tests/ -v --tb=short --junitxml="$(Build.StagingDirectory)\test-results.xml"
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: 'Run unit tests'
    timeoutInMinutes: 10
    errorActionPreference: stop

  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(Build.StagingDirectory)/test-results.xml'
      testRunTitle: 'Sync Script Unit Tests'
    condition: always()
    displayName: 'Publish test results'
