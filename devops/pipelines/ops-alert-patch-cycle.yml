# Operations API - Patch Cycle Teams Notification
# Sends Monday alert for all patch cycles in the upcoming week (Mon-Sun)
# Posts Adaptive Card with server list, times, and known issues

trigger: none

schedules:
  - cron: "30 7 * * 1"
    displayName: "Patch cycle notification - Monday 07:30"
    branches:
      include:
        - main
    always: true

pool:
  name: 'Default'

variables:
  - group: operations-api-prod

steps:
  - powershell: |
      $repoRoot = "$(Build.SourcesDirectory)\operations-api"
      $workDir = "$(Build.StagingDirectory)\sync_run"
      New-Item -ItemType Directory -Force -Path $workDir | Out-Null
      Copy-Item "$repoRoot\sync\common.py" "$workDir\"
      Copy-Item "$repoRoot\sync\alerts\alert_patch_cycle.py" "$workDir\"
      pip install -r "$repoRoot\sync\requirements.txt"
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: 'Prepare sync environment'
    errorActionPreference: stop

  - powershell: |
      Set-Location "$(Build.StagingDirectory)\sync_run"
      python alert_patch_cycle.py --week --verbose
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    displayName: 'Send weekly patching alert'
    errorActionPreference: stop
    env:
      OPS_DB_HOST: $(OPS_DB_HOST)
      OPS_DB_PORT: $(OPS_DB_PORT)
      OPS_DB_NAME: $(OPS_DB_NAME)
      OPS_DB_USER: $(OPS_DB_USER)
      OPS_DB_PASSWORD: $(OPS_DB_PASSWORD)
      OPS_DB_SSLMODE: $(OPS_DB_SSLMODE)
      TEAMS_PATCHING_WEBHOOK_URL: $(TEAMS_PATCHING_WEBHOOK_URL)
