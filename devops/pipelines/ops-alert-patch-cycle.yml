# Operations API - Patch Cycle Teams Notification
# Sends advance warning (5 days) and day-of reminder for upcoming patch cycles
# Posts Adaptive Card with server list, times, and known issues

trigger: none

schedules:
  - cron: "30 7 * * 1"
    displayName: "Patch cycle notification - Monday 07:30"
    branches:
      include:
        - main
    always: true

pool:
  name: 'Default'

variables:
  - group: operations-api-prod

steps:
  - script: |
      REPO_ROOT="$(Build.SourcesDirectory)/operations-api"
      WORK_DIR="$(Build.StagingDirectory)/sync_run"
      mkdir -p "$WORK_DIR"
      cp "$REPO_ROOT/sync/common.py" "$WORK_DIR/"
      cp "$REPO_ROOT/sync/alerts/alert_patch_cycle.py" "$WORK_DIR/"
      pip install -r "$REPO_ROOT/sync/requirements.txt"
    displayName: 'Prepare sync environment'

  - script: |
      cd "$(Build.StagingDirectory)/sync_run"
      python alert_patch_cycle.py --days-ahead 5 --weekend --verbose
    displayName: 'Send weekend patching alert'
    env:
      OPS_DB_HOST: $(OPS_DB_HOST)
      OPS_DB_PORT: $(OPS_DB_PORT)
      OPS_DB_NAME: $(OPS_DB_NAME)
      OPS_DB_USER: $(OPS_DB_USER)
      OPS_DB_PASSWORD: $(OPS_DB_PASSWORD)
      TEAMS_PATCHING_WEBHOOK_URL: $(TEAMS_PATCHING_WEBHOOK_URL)
