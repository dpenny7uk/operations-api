# Operations API - Disk Monitoring Sync from SolarWinds Orion
#
# Runs hourly — replaces the Tableau disk dashboard with a near-real-time
# snapshot in monitoring.disk_snapshots. Cadence was originally every 15 min;
# relaxed to hourly because the breach-alert pipeline (ops-alert-disk-breaches.yml)
# only runs 3x daily on weekdays, so 15-min syncs were producing ~16x more
# data than alerting consumed. Hourly is still 3x faster than the alert
# cadence and keeps the dashboard's situational-awareness role intact.
# Each run also triggers a REFRESH of the monitoring.disk_current matview.

trigger: none

schedules:
  - cron: "0 * * * *"
    displayName: "Disk monitoring sync hourly"
    branches:
      include:
        - main
    always: true

pool:
  # Dedicated agent whose service runs as CONTOSO\SVC_Tableau — the only
  # identity that can read SolarWindsOrion (Windows-only login, db_datareader).
  # pyodbc + Trusted_Connection inherits that identity at OS level. The pool
  # must exist with at least one online agent before this pipeline can run.
  name: 'solarwinds-readers'

variables:
  - group: operations-api-prod

steps:
  - template: templates/ops-sync-steps.yml
    parameters:
      scriptPath: disks/sync_solarwinds_disks.py
      displayName: 'Sync Disk Snapshots from SolarWinds'
      extraArgs: '--verbose'
      # Opt in to SolarWinds env vars (HOST/PORT/DATABASE/USER/PASSWORD) — see
      # templates/ops-sync-steps.yml. Only this pipeline opts in; the credentials
      # are never exposed to other sync processes.
      solarwindsEnv: true
