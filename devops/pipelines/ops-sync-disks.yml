# Operations API - Disk Monitoring Sync from SolarWinds Orion
#
# Runs every 15 minutes — replaces the Tableau disk dashboard with a near-real-time
# snapshot in monitoring.disk_snapshots. Note this cadence is a deliberate departure
# from the daily-stagger pattern of other syncs (see comment in templates/ops-sync-steps.yml);
# alerting is handled separately by ops-alert-disk-breaches.yml so this frequency does
# not drive Teams noise.

trigger: none

schedules:
  - cron: "*/15 * * * *"
    displayName: "Disk monitoring sync every 15 min"
    branches:
      include:
        - main
    always: true

pool:
  name: 'Default'

variables:
  - group: operations-api-prod

steps:
  - template: templates/ops-sync-steps.yml
    parameters:
      scriptPath: disks/sync_solarwinds_disks.py
      displayName: 'Sync Disk Snapshots from SolarWinds'
      extraArgs: '--verbose'
      # Opt in to SolarWinds env vars (HOST/PORT/DATABASE/USER/PASSWORD) — see
      # templates/ops-sync-steps.yml. Only this pipeline opts in; the credentials
      # are never exposed to other sync processes.
      solarwindsEnv: true
