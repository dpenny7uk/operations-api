<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Access Attestation — Operations Console</title>
<link rel="stylesheet" href="css/op-fonts.css?v=__BUILD_HASH__">
<link rel="stylesheet" href="css/op-base.css?v=__BUILD_HASH__">
<style>
  /* Standalone attest page — minimal layout, no SPA chrome. */
  body {
    background: var(--paper);
    color: var(--ink);
    padding: 32px 20px 80px;
    min-height: 100vh;
  }
  .attest-wrap {
    max-width: 880px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .attest-header { display: flex; flex-direction: column; gap: 6px; padding-bottom: 18px; border-bottom: 1px solid var(--rule); }
  .attest-header .brand {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-3);
  }
  .attest-header h1 {
    font-family: var(--display); font-size: 32px; line-height: 1.1;
    letter-spacing: -0.015em; color: var(--ink); font-weight: 500;
  }
  .attest-header .sub { color: var(--ink-2); font-size: 14px; }
  .attest-meta {
    display: flex; flex-wrap: wrap; gap: 18px;
    font-family: var(--mono); font-size: 11.5px; color: var(--ink-2);
  }
  .attest-meta b { color: var(--ink); font-weight: 600; }
  .completed-banner {
    border: 1px solid var(--ok); background: var(--ok-wash);
    padding: 16px 20px; display: flex; align-items: center; gap: 14px;
  }
  .completed-banner .icon {
    width: 28px; height: 28px; border-radius: 999px; background: var(--ok); color: white;
    display: inline-flex; align-items: center; justify-content: center; font-weight: 600;
    flex-shrink: 0; font-family: var(--mono);
  }
  .completed-banner .text { display: flex; flex-direction: column; gap: 2px; }
  .completed-banner .title { font-weight: 600; color: var(--ink); }
  .completed-banner .sub { font-family: var(--mono); font-size: 11.5px; color: var(--ink-2); }
  .instructions {
    background: var(--paper-2); border: 1px solid var(--rule);
    padding: 16px 20px; font-family: var(--mono); font-size: 12px;
    color: var(--ink-2); line-height: 1.6;
  }
  .instructions b { color: var(--ink); }
  .subjects-table { border: 1px solid var(--rule); background: var(--card); }
  .subjects-table .row {
    display: grid; grid-template-columns: 1fr 1fr 220px;
    gap: 14px; padding: 14px 18px; border-bottom: 1px solid var(--rule);
    align-items: center;
  }
  .subjects-table .row:last-child { border-bottom: none; }
  .subjects-table .row.disabled-user { background: var(--paper-2); }
  .subj-name { display: flex; flex-direction: column; gap: 2px; }
  .subj-name .display { font-weight: 600; color: var(--ink); }
  .subj-name .sam { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
  .subj-email { font-family: var(--mono); font-size: 12px; color: var(--ink-2); }
  .subj-disabled-flag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--crit); margin-top: 2px; }
  .decision-cell { display: flex; gap: 0; border: 1px solid var(--rule); border-radius: 2px; overflow: hidden; }
  .decision-cell label {
    flex: 1; padding: 8px 12px; text-align: center; cursor: pointer;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-3); background: var(--card); transition: background var(--t), color var(--t);
    user-select: none;
  }
  .decision-cell label + label { border-left: 1px solid var(--rule); }
  .decision-cell input[type="radio"] { display: none; }
  .decision-cell input[type="radio"]:checked + span { font-weight: 700; }
  .decision-cell label.keep-on { background: var(--ok-wash); color: var(--ok); font-weight: 600; }
  .decision-cell label.revoke-on { background: var(--crit-wash); color: var(--crit); font-weight: 600; }
  .decision-cell label.disabled { cursor: not-allowed; opacity: 0.65; }
  .decision-summary {
    display: flex; gap: 16px; padding: 14px 18px; background: var(--paper-2);
    border-bottom: 1px solid var(--rule); font-family: var(--mono); font-size: 11.5px;
  }
  .decision-summary .keep { color: var(--ok); }
  .decision-summary .revoke { color: var(--crit); }
  .decision-summary b { font-weight: 700; }
  .comment-cell { margin-top: 6px; }
  .comment-cell input {
    width: 100%; padding: 6px 8px; border: 1px solid var(--rule);
    background: var(--card); font-family: var(--mono); font-size: 11.5px;
  }
  .actions { display: flex; gap: 12px; align-items: center; padding-top: 12px; }
  .actions button.primary {
    background: var(--ink); color: var(--paper); padding: 12px 28px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 600; cursor: pointer; transition: background var(--t);
  }
  .actions button.primary:hover { background: var(--signal-2); }
  .actions button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions .hint { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 14px 24px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18); z-index: 100;
    opacity: 0; transition: opacity var(--t);
  }
  .toast.show { opacity: 1; }
  .empty-state {
    padding: 60px 20px; text-align: center; color: var(--ink-3);
    font-family: var(--mono); font-size: 13px;
  }
  .empty-state h2 { font-family: var(--display); font-size: 24px; color: var(--ink); font-weight: 500; margin-bottom: 8px; }
  .demo-ribbon-attest {
    background: var(--warn-wash); border: 1px solid var(--warn);
    padding: 10px 16px; font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.06em; color: var(--ink); display: flex; gap: 12px; align-items: center;
  }
  .demo-ribbon-attest b { color: var(--warn); letter-spacing: 0.12em; }
</style>
</head>
<body data-theme="light" data-accent="amber" data-surface="ivory">
<div id="root" class="attest-wrap"></div>
<div id="toast" class="toast"></div>

<script src="js/op-h.js?v=__BUILD_HASH__"></script>
<script src="js/auditing-demo-data.js?v=__BUILD_HASH__"></script>
<script>
(function () {
  'use strict';
  const h = window.H;
  const D = window.AUDITING_DATA;
  const root = document.getElementById('root');

  // Read ?t=<token> from URL. Tokens beginning 'demo-' use the bundled fixture
  // (offline prototype); anything else is a real signed token resolved via
  // GET/POST /api/auditing/public/attestation/{token}.
  const params = new URLSearchParams(location.search);
  const token = params.get('t');

  const API_BASE = window.location.hostname === 'localhost'
    ? 'http://localhost:5000/api'
    : window.location.origin + '/api';

  // Mutable submit state (pending mode): one keep/revoke + optional comment per subject.
  const pending = {};
  const comments = {};
  let demoMode = false;

  function fmtDateTime(s) {
    if (!s) return '—';
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' }) +
      ' at ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }
  function renderEmpty(title, sub) {
    root.innerHTML = '';
    root.appendChild(h('div.empty-state', null, h('h2', null, title), h('div', null, sub)));
  }
  function renderLoading() {
    root.innerHTML = '';
    root.appendChild(h('div.empty-state', null, h('div', null, 'Loading…')));
  }

  if (!token) {
    renderEmpty('No token provided',
      'Open this page with the signed link from your attestation email. (Demo: ?t=demo-pending or ?t=demo-completed.)');
    return;
  }

  start();

  async function start() {
    let view = null;
    if (token.indexOf('demo-') === 0) {
      demoMode = true;
      if (!D) { renderEmpty('Demo data unavailable', 'auditing-demo-data.js did not load.'); return; }
      view = buildDemoView(token);
      if (!view) { renderEmpty('Invalid or expired link', 'This demo token is not recognised. Try ?t=demo-pending or ?t=demo-completed.'); return; }
    } else {
      renderLoading();
      let resp;
      try {
        const r = await fetch(API_BASE + '/auditing/public/attestation/' + encodeURIComponent(token), { credentials: 'omit' });
        if (!r.ok) {
          renderEmpty('Invalid or expired link',
            'This attestation link is not recognised — the token may be invalid, expired, or already revoked.');
          return;
        }
        resp = await r.json();
      } catch (e) {
        renderEmpty('Could not load attestation', 'The server could not be reached. Please try again shortly.');
        return;
      }
      view = buildApiView(resp);
    }
    initDecisions(view);
    render(view);
  }

  function initDecisions(view) {
    view.subjects.forEach(s => { pending[s.sam] = null; });
    if (view.state !== 'pending') {
      Object.keys(view.decisions).forEach(sam => {
        pending[sam] = view.decisions[sam].decision;
        if (view.decisions[sam].comment) comments[sam] = view.decisions[sam].comment;
      });
    }
  }

  function buildDemoView(tok) {
    const packet = D.getPacketByToken(tok);
    if (!packet) return null;
    const campaign = D.getCampaign(packet.campaign_id);
    const subjects = (packet.subjects || []).map(sam => {
      const u = D.getUser(sam) || { sam: sam, display: sam, email: '', enabled: true };
      return { sam: u.sam, display: u.display, email: u.email, enabled: u.enabled };
    });
    const ownSubmitted = !!packet.submitted_at;
    const closing = D.getClosingPacket(packet.campaign_id);
    const closedByOther = !ownSubmitted && !!closing;
    const state = ownSubmitted ? 'submitted' : closedByOther ? 'closed_by_other' : 'pending';
    const decisions = {};
    if (state !== 'pending') {
      const srcPid = ownSubmitted ? packet.packet_id : closing.packet_id;
      D.getDecisionsByPacket(srcPid).forEach(d => { decisions[d.subject_sam] = { decision: d.decision, comment: d.comment || '' }; });
    }
    return {
      state: state,
      campaignName: campaign ? campaign.name : 'Access Attestation',
      applicationName: campaign ? campaign.application_name : null,
      dueAt: campaign ? campaign.due_at : null,
      ccMailbox: campaign ? campaign.cc_audit_mailbox : null,
      recipientDisplay: packet.recipient_display,
      recipientKind: packet.recipient_kind,
      roleNote: packet.role_note,
      subjects: subjects,
      submittedByDisplay: ownSubmitted ? packet.submitted_by_display : (closing ? closing.submitted_by_display : null),
      submittedAt: ownSubmitted ? packet.submitted_at : (closing ? closing.submitted_at : null),
      decisions: decisions,
    };
  }

  function buildApiView(r) {
    const decisions = {};
    (r.decisions || []).forEach(d => { decisions[d.subject_sam] = { decision: d.decision, comment: d.comment || '' }; });
    return {
      state: r.state || 'pending',
      campaignName: r.campaign_name || 'Access Attestation',
      applicationName: r.application_name || null,
      dueAt: r.due_at || null,
      ccMailbox: r.cc_audit_mailbox || null,
      recipientDisplay: r.recipient_display,
      recipientKind: r.recipient_kind,
      roleNote: r.role_note,
      subjects: (r.subjects || []).map(s => ({
        sam: s.subject_sam, display: s.subject_display || s.subject_sam,
        email: s.subject_email || '', enabled: s.enabled !== false,
      })),
      submittedByDisplay: r.submitted_by_display || null,
      submittedAt: r.submitted_at || null,
      decisions: decisions,
    };
  }

  async function submit(view) {
    const stillPending = view.subjects.filter(s => !pending[s.sam]).length;
    if (stillPending > 0) return;

    if (demoMode) {
      showToast('Thank you — submission received. (Demo token: nothing was actually sent.)');
      return;
    }

    const decisions = view.subjects.map(s => ({
      subject_sam: s.sam, decision: pending[s.sam], comment: comments[s.sam] || null,
    }));

    let r;
    try {
      r = await fetch(API_BASE + '/auditing/public/attestation/' + encodeURIComponent(token), {
        method: 'POST', credentials: 'omit',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'ops-api' },
        body: JSON.stringify({ decisions: decisions }),
      });
    } catch (e) {
      showToast('Network error — could not submit. Please try again.');
      return;
    }

    if (r.ok || r.status === 409) {
      const body = await r.json().catch(() => null);
      if (body) {
        const v = buildApiView(body);
        initDecisions(v);
        render(v);
        showToast(r.ok ? 'Submitted — thank you.' : 'This attestation was already completed.');
        return;
      }
    }
    if (r.status === 400) {
      const t = await r.text().catch(() => '');
      showToast(t || 'Invalid submission.');
      return;
    }
    showToast('Could not submit (' + r.status + '). Please try again.');
  }

  function render(view) {
    root.innerHTML = '';
    const isCompleted = view.state !== 'pending';

    if (demoMode) {
      root.appendChild(h('div.demo-ribbon-attest', null,
        h('b', null, 'DEMO DATA'),
        h('span', null, 'Demo token — this page will not send your submission. Use a real campaign link to submit live.'),
      ));
    }

    const recipientGreeting = view.recipientKind === 'nominee'
      ? 'You have been nominated to attest access for this application.'
      : 'You have been asked to attest access for your direct reports.';

    root.appendChild(h('div.attest-header', null,
      h('div.brand', null, 'OPERATIONS CONSOLE · ACCESS ATTESTATION'),
      h('h1', null, view.campaignName),
      h('div.sub', null, recipientGreeting),
    ));

    root.appendChild(h('div.attest-meta', null,
      h('span', null, 'For: ', h('b', null, (view.recipientDisplay || '—') + (view.roleNote ? ' (' + view.roleNote + ')' : ''))),
      view.applicationName ? h('span', null, 'Application: ', h('b', null, view.applicationName)) : null,
      h('span', null, 'Routing: ', h('b', null, view.recipientKind === 'nominee' ? 'Nominee' : 'Line manager')),
      view.dueAt ? h('span', null, 'Due: ', h('b', null, String(view.dueAt).slice(0, 10))) : null,
      view.ccMailbox ? h('span', null, 'CC: ', h('b', null, view.ccMailbox)) : null,
    ));

    if (isCompleted) {
      const title = view.state === 'submitted'
        ? 'This attestation has already been completed.'
        : 'This campaign was closed by another nominee.';
      root.appendChild(h('div.completed-banner', null,
        h('span.icon', null, '✓'),
        h('div.text', null,
          h('div.title', null, title),
          h('div.sub', null, 'Submitted by ', h('b', { style: { color: 'var(--ink)' } }, view.submittedByDisplay || '—'),
            ' on ', fmtDateTime(view.submittedAt), '. The decisions are shown below for your records.'),
        ),
      ));
    } else {
      root.appendChild(h('div.instructions', null,
        h('b', null, 'For each person:'), ' choose ',
        h('b', { style: { color: 'var(--ok)' } }, 'Keep'),
        ' if they still need access, or ',
        h('b', { style: { color: 'var(--crit)' } }, 'Revoke'),
        ' if their access should be removed. ',
        'Add a comment if useful. Submit when you have decided every row. ',
        view.recipientKind === 'nominee'
          ? h('span', null, 'Note: as a nominee, the first nominee to submit closes the attestation for everyone.')
          : null,
      ));
    }

    const sumKeep = view.subjects.filter(s => pending[s.sam] === 'keep').length;
    const sumRevoke = view.subjects.filter(s => pending[s.sam] === 'revoke').length;
    const sumPending = view.subjects.length - sumKeep - sumRevoke;

    const tableWrap = h('div.subjects-table');
    tableWrap.appendChild(h('div.decision-summary', null,
      h('span.keep', null, h('b', null, String(sumKeep)), ' to keep'),
      h('span.revoke', null, h('b', null, String(sumRevoke)), ' to revoke'),
      isCompleted ? null : h('span', { style: { color: 'var(--ink-3)' } }, h('b', null, String(sumPending)), ' pending'),
      h('span', { style: { marginLeft: 'auto', color: 'var(--ink-3)' } }, view.subjects.length + ' subject' + (view.subjects.length === 1 ? '' : 's') + ' total'),
    ));

    view.subjects.forEach(m => {
      const row = h('div.row' + (m.enabled ? '' : '.disabled-user'));
      row.appendChild(h('div.subj-name', null,
        h('span.display', null, m.display),
        h('span.sam', null, m.sam),
        m.enabled ? null : h('span.subj-disabled-flag', null, 'AD account disabled'),
      ));
      row.appendChild(h('div.subj-email', null, m.email));

      const cur = pending[m.sam];
      const decisionCell = h('div', null,
        h('div.decision-cell', null,
          h('label' + (cur === 'keep' ? '.keep-on' : '') + (isCompleted ? '.disabled' : ''), null,
            h('input', {
              type: 'radio', name: 'd-' + m.sam, value: 'keep', checked: cur === 'keep', disabled: isCompleted,
              on: { change: () => { if (!isCompleted) { pending[m.sam] = 'keep'; render(view); } } },
            }),
            h('span', null, 'Keep'),
          ),
          h('label' + (cur === 'revoke' ? '.revoke-on' : '') + (isCompleted ? '.disabled' : ''), null,
            h('input', {
              type: 'radio', name: 'd-' + m.sam, value: 'revoke', checked: cur === 'revoke', disabled: isCompleted,
              on: { change: () => { if (!isCompleted) { pending[m.sam] = 'revoke'; render(view); } } },
            }),
            h('span', null, 'Revoke'),
          ),
        ),
        (cur === 'revoke' || (isCompleted && comments[m.sam])) ? h('div.comment-cell', null,
          h('input', {
            type: 'text', placeholder: 'Reason (optional)', value: comments[m.sam] || '', disabled: isCompleted,
            on: { input: (e) => { comments[m.sam] = e.target.value; } },
          }),
        ) : null,
      );
      row.appendChild(decisionCell);
      tableWrap.appendChild(row);
    });
    root.appendChild(tableWrap);

    if (!isCompleted) {
      const canSubmit = sumPending === 0;
      root.appendChild(h('div.actions', null,
        h('button.primary', { disabled: !canSubmit, on: { click: () => submit(view) } }, 'Submit attestation'),
        h('span.hint', null, canSubmit
          ? 'All ' + view.subjects.length + ' decisions ready to submit'
          : sumPending + ' decision' + (sumPending === 1 ? '' : 's') + ' still pending'),
      ));
    }
  }
})();
</script>
</body>
</html>
